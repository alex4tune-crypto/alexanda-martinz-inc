name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run lint

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py database.py tools/*.py agents/*.py
